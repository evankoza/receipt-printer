[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
; BluetoothSerial needs a big app partition
board_build.partitions = huge_app.csv
lib_deps =
    links2004/WebSockets @ ^2.4.1
    bblanchon/ArduinoJson @ ^7.0.4
    bodmer/TFT_eSPI @ ^2.5.43
build_flags =
    -DCORE_DEBUG_LEVEL=1
    ; ideaspark ESP32 with integrated 1.9" ST7789 (170x320) — same board as ChessBot
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=170
    -DTFT_HEIGHT=320
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_BL=32
    -DTFT_BACKLIGHT_ON=HIGH
    -DTFT_INVERSION_ON=1
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
